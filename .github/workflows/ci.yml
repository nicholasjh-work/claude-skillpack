name: Scholar Editor CI

on:
  push:
    branches: [main, "fix/**", "feature/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  smoke-tests:
    name: "Smoke Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run smoke tests
        run: pytest tests/ -v --tb=short -k "not scholar_editor and not pattern_coverage and not fixture"
        continue-on-error: false

  skill-count:
    name: "Skill Inventory"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count skills
        run: |
          COUNT=$(find core data-engineering writing career -name SKILL.md 2>/dev/null | wc -l | tr -d ' ')
          echo "Found $COUNT SKILL.md files across all categories"
          find core data-engineering writing career -name SKILL.md | sort

  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs: [smoke-tests, skill-count]
    steps:
      - name: All checks passed
        run: echo "CI passed"
