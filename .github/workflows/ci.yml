name: Scholar Editor CI

on:
  push:
    branches: [main, "fix/**", "feature/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  COVERAGE_THRESHOLD: "0.9"

jobs:
  # ─────────────────────────────────────────────
  # Shared unit tests
  # ─────────────────────────────────────────────

  shared-unit-tests:
    name: "Shared — Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run shared unit tests
        run: pytest tests/shared/ -v --tb=short
        continue-on-error: false

  # ─────────────────────────────────────────────
  # Scholar Editor — full test suite
  # ─────────────────────────────────────────────

  scholar-editor-tests:
    name: "Scholar Editor — Full Test Suite"
    runs-on: ubuntu-latest
    needs: shared-unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scholar editor tests
        run: pytest tests/test_scholar_editor.py -v --tb=short
        continue-on-error: false

  # ─────────────────────────────────────────────
  # Pattern self-test: coverage >= 0.90
  # ─────────────────────────────────────────────

  pattern-coverage:
    name: "Scholar Editor — Pattern Coverage (threshold 0.9)"
    runs-on: ubuntu-latest
    needs: shared-unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pattern selftest (fails if coverage < 0.9)
        run: python -m shared.scholar_editor.mock_detector --selftest
        continue-on-error: false

  # ─────────────────────────────────────────────
  # Fixture coverage check
  # ─────────────────────────────────────────────

  fixture-coverage:
    name: "Scholar Editor — Fixture Coverage Check"
    runs-on: ubuntu-latest
    needs: scholar-editor-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check fixture pattern coverage
        run: |
          python tools/check_pattern_coverage.py \
            --fixture tests/fixtures.jsonl \
            --threshold ${{ env.COVERAGE_THRESHOLD }}
        continue-on-error: false

  # ─────────────────────────────────────────────
  # Smoke tests (email-writer stubs)
  # ─────────────────────────────────────────────

  smoke-tests:
    name: "Smoke — Email Writer Stubs"
    runs-on: ubuntu-latest
    needs: shared-unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run smoke tests
        run: pytest tests/test_email_writer.py -v --tb=short
        continue-on-error: false

  # ─────────────────────────────────────────────
  # CI Gate — all must pass before merge
  # ─────────────────────────────────────────────

  ci-gate:
    name: "CI Gate — All checks passed"
    runs-on: ubuntu-latest
    needs:
      - shared-unit-tests
      - scholar-editor-tests
      - pattern-coverage
      - fixture-coverage
      - smoke-tests
    steps:
      - name: Assert all jobs succeeded
        run: |
          echo "All CI checks passed."
          echo "  shared-unit-tests:     OK"
          echo "  scholar-editor-tests:  OK"
          echo "  pattern-coverage:      OK"
          echo "  fixture-coverage:      OK"
          echo "  smoke-tests:           OK"
          exit 0
